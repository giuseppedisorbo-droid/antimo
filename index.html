<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gestione Attività Esterne</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="top-nav">
        <h1>Attività Esterna</h1>
        <div class="status-badge" id="dayStatusBadge">Giornata non iniziata</div>
    </header>

    <main class="container">
        <!-- SEZIONE GESTIONE GIORNATA -->
        <section class="card glass-card" id="dayManagerSection">
            <h2 id="dayManagerTitle">Inizio Giornata</h2>
            
            <div id="startDayForm" class="form-group">
                <label for="kmIniziali">Km Iniziali</label>
                <input type="number" id="kmIniziali" placeholder="Es. 45000">
                <button class="btn btn-primary btn-orange" id="btnStartDay">
                    <span class="btn-icon">▶</span>
                    INIZIA GIORNATA
                </button>
            </div>

            <div id="endDayForm" class="form-group hidden">
                <p class="summary-text" id="giornataInfo">Giornata iniziata alle --:--</p>
                <label for="kmFinali">Km Finali (Opzionale)</label>
                <input type="number" id="kmFinali" placeholder="Es. 45150">
                <button class="btn btn-primary btn-blue" id="btnEndDay">
                    <span class="btn-icon">⏹</span>
                    TERMINA GIORNATA
                </button>
            </div>
        </section>

        <!-- SEZIONE INSERIMENTO INTERVENTO (visibile solo a giornata iniziata) -->
        <section class="card glass-card hidden" id="interventionSection">
            <h2>Nuovo Intervento</h2>
            <form id="newInterventionForm">
                <div class="form-group">
                    <label for="tipoAttivita">Tipo Intervento (Partenza) *</label>
                    <select id="tipoAttivita" required>
                        <option value="" disabled selected>Seleziona tipologia...</option>
                        <option value="Sostituzione">Sostituzione</option>
                        <option value="Installazione">Installazione</option>
                        <option value="Visita">Visita</option>
                        <option value="Controllo periodico">Controllo periodico</option>
                        <option value="Valutazione">Valutazione</option>
                        <option value="Consegna">Consegna</option>
                        <option value="Ritiro">Ritiro</option>
                        <option value="Formazione">Formazione</option>
                        <option value="Attività interna SAT">Attività interna SAT (c/o struttura)</option>
                        <option value="Altro">Altro</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="paziente">Paziente / Ente *</label>
                    <input type="text" id="paziente" placeholder="Nominativo" required>
                </div>

                <div class="form-group">
                    <label for="destinazione">Destinazione (Città/Indirizzo) *</label>
                    <input type="text" id="destinazione" placeholder="Es. Napoli / Via Roma 1" required>
                </div>
                
                <div class="form-group">
                    <label for="fotoMatricola">Foto Codice a Barre / Matricola (Opzionale)</label>
                    <input type="file" id="fotoMatricola" accept="image/*" capture="environment">
                    <div id="fotoPreviewContainer" class="hidden" style="margin-top: 10px; text-align: center;">
                        <img id="fotoPreview" src="" alt="Anteprima Matricola" style="max-width: 100%; border-radius: 8px; border: 2px solid var(--blue-light); max-height: 200px; object-fit: contain;">
                        <button type="button" class="btn btn-danger" id="btnRimuoviFoto" style="margin-top: 10px; padding: 0.5rem;">Rimuovi Foto</button>
                    </div>
                </div>

                <div class="form-group">
                    <label for="dispositivi">Dispositivi</label>
                    <input list="dispositiviList" id="dispositivi" placeholder="Seleziona o scrivi...">
                    <datalist id="dispositiviList">
                        <option value="D3">
                        <option value="DPad / DPad Max">
                        <option value="Matrix">
                        <option value="Aspiratore">
                        <option value="PrismaVENT">
                        <option value="O2 (Bombola/Concentratore)">
                        <option value="Stativo">
                        <option value="Comunicatore Dinamico">
                        <option value="Stabilizzatore di Corrente">
                        <option value="CPAP / AutoCPAP">
                        <option value="Nessuno">
                    </datalist>
                </div>

                <div class="form-group">
                    <label for="note">Eventuali Note</label>
                    <textarea id="note" rows="2" placeholder="Note sull'intervento..."></textarea>
                </div>

                <button type="submit" class="btn btn-primary btn-orange btn-large" id="btnStartIntervention">
                     <span class="btn-icon">⚡</span> INIZIA ATTIVITÀ
                </button>
            </form>
        </section>

        <!-- SEZIONE INTERVENTO IN CORSO -->
        <section class="card glass-card active-intervention hidden" id="activeInterventionSection">
            <div class="pulse-ring"></div>
            <h2>Intervento in Corso</h2>
            <div class="details-box">
                <p><strong>Paziente:</strong> <span id="activePaziente"></span></p>
                <p><strong>Destinazione:</strong> <span id="activeDestinazione"></span></p>
                <p><strong>Iniziato alle:</strong> <span id="activeStartTime"></span></p>
                <p><strong>Durata:</strong> <span id="activeDuration">00:00:00</span></p>
            </div>
            
            <div class="form-group mt-15">
                <label for="kmPercorsi">Km A/R Percorsi per questo intervento (opzionale)</label>
                <input type="number" id="kmPercorsi" placeholder="Es. 35">
            </div>

            <button class="btn btn-primary btn-blue btn-large" id="btnStopIntervention">
                <span class="btn-icon">✓</span> TERMINA ATTIVITÀ
            </button>
        </section>

        <!-- SEZIONE RIEPILOGO & EXPORT -->
        <section class="card glass-card" id="exportSection">
            <h2>Gestione Dati</h2>
            <p class="summary-text">Interventi registrati: <strong id="interventiCount">0</strong></p>
            <div class="button-group">
                <button class="btn btn-secondary" id="btnExportCSV">
                     <span class="btn-icon">📥</span> SCARICA EXCEL (CSV)
                </button>
                <button class="btn btn-danger" id="btnClearData">
                     <span class="btn-icon">🗑</span> Svuota Dati
                </button>
            </div>
        </section>

    </main>
    <script type="module" src="app.js"></script>
</body>
</html>

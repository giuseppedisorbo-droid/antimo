<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gestione Anagrafiche</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=61">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2563eb">
    <style>
        .anagrafiche-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
            margin-top: 15px;
        }
        .anagrafiche-table th, .anagrafiche-table td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }
        .anagrafiche-table th {
            background-color: var(--blue-primary);
            color: white;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .anagrafiche-table tr:nth-child(even) {
            background-color: #f9fafb;
        }
    </style>
</head>
<body>
    <header style="display: flex; flex-direction: column; gap: 10px; padding: 15px;">
        <div style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
            <div style="display: flex; align-items: center; gap: 10px;">
                <img src="icon-192x192.png" alt="Logo" style="width: 40px; height: 40px; border-radius: 8px;">
                <h1 style="margin: 0; font-size: 1.2rem; line-height: 1.2;">Rubrica<br>Anagrafiche</h1>
            </div>
            <a href="index.html" class="btn" style="margin: 0; background-color: white; color: var(--blue-dark); text-decoration: none; border: 2px solid var(--blue-dark); display: flex; align-items: center; padding: 0.5rem 1rem; border-radius: 8px; font-weight: bold;">🔙 Menu Principale</a>
        </div>
    </header>

    <main>
        <!-- Form Nuova Anagrafica -->
        <section class="card" style="border-top: 5px solid var(--blue-primary); margin-bottom: 20px;">
            <h2 style="display: flex; justify-content: space-between; align-items: center; cursor: pointer;" id="toggleFormAnagrafica">
                <span style="color: var(--blue-dark);"><span class="btn-icon">➕</span> Aggiungi Nuova Anagrafica</span>
                <span id="formIcon">▼</span>
            </h2>
            
            <form id="anagraficheForm" class="hidden" style="margin-top: 15px;">
                <div style="display: flex; gap: 10px; flex-wrap: wrap;">
                    <div class="form-group" style="flex: 1; min-width: 140px;">
                        <label for="nome">Nome / Ragione Sociale *</label>
                        <input type="text" id="nome" required>
                    </div>
                    <div class="form-group" style="flex: 1; min-width: 140px;">
                    <div class="form-group" style="flex: 1; min-width: 140px;">
                        <label for="cognome">Cognome (se persona fisica)</label>
                        <input type="text" id="cognome">
                    </div>
                </div>

                <div style="display: flex; gap: 10px; flex-wrap: wrap;">
                    <div class="form-group" style="flex: 1; min-width: 140px;">
                        <label for="qualifica">Qualifica (Ruolo) *</label>
                        <select id="qualifica" required>
                            <option value="">Seleziona...</option>
                            <option value="Paziente">Paziente</option>
                            <option value="Operatore sanitario">Operatore sanitario</option>
                            <option value="Tecnico">Tecnico</option>
                            <option value="Amministrativo">Amministrativo</option>
                            <option value="Commerciale">Commerciale</option>
                            <option value="Dipendente">Dipendente</option>
                        </select>
                    </div>
                    <div class="form-group" style="flex: 1; min-width: 140px;">
                        <label for="codiceFiscale">Codice Fiscale / P.IVA</label>
                        <input type="text" id="codiceFiscale" style="text-transform: uppercase;">
                    </div>
                </div>

                <div style="display: flex; gap: 10px; flex-wrap: wrap;">
                    <div class="form-group" style="flex: 1; min-width: 140px;">
                        <label for="localita">Località *</label>
                        <input type="text" id="localita" required>
                    </div>
                    <div class="form-group" style="flex: 1; min-width: 140px;">
                        <label for="provincia">Provincia</label>
                        <input type="text" id="provincia" placeholder="Es. NA" maxlength="2" style="text-transform: uppercase;">
                    </div>
                </div>

                <div class="form-group">
                    <label for="indirizzo">Indirizzo *</label>
                    <input type="text" id="indirizzo" required>
                </div>

                <div style="display: flex; gap: 10px; flex-wrap: wrap;">
                    <div class="form-group" style="flex: 1; min-width: 140px;">
                        <label for="telefono1">Telefono 1 *</label>
                        <input type="tel" id="telefono1" required>
                    </div>
                    <div class="form-group" style="flex: 1; min-width: 140px;">
                        <label for="telefono2">Telefono 2</label>
                        <input type="tel" id="telefono2">
                    </div>
                </div>

                <div class="form-group">
                    <label for="allegati">Allegati (PDF, Foto, Video)</label>
                    <input type="file" id="allegati" multiple accept="image/*,application/pdf,video/*">
                    <div id="filePreviewContainer" style="display: flex; gap: 10px; flex-wrap: wrap; margin-top: 10px;" class="hidden"></div>
                </div>

                <button type="submit" id="btnSaveAnagrafica" class="btn btn-primary btn-large" style="width: 100%; margin-top: 10px;">
                    <span class="btn-icon">💾</span> SALVA ANAGRAFICA
                </button>
            </form>
        </section>

        <!-- Tabella Anagrafiche -->
        <section class="card">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                <h2 style="color: var(--blue-dark); margin: 0;"><span class="btn-icon">📁</span> Elenco Anagrafiche</h2>
            </div>
            
            <div class="form-group">
                <input type="text" id="searchAnagrafiche" placeholder="🔍 Cerca per nome, cognome, CF o località..." style="border-radius: 20px; padding: 10px 15px;">
            </div>

            <div style="overflow-x: auto; max-height: 60vh;">
                <table class="anagrafiche-table">
                    <thead>
                        <tr>
                            <th>Nominativo</th>
                            <th>Qualifica</th>
                            <th>Località / Indirizzo</th>
                            <th>Recapiti</th>
                            <th>CF / P.IVA</th>
                            <th>Allegati</th>
                            <th>Azioni</th>
                        </tr>
                    </thead>
                    <tbody id="anagraficheTableBody">
                        <tr><td colspan="7" style="text-align: center; padding: 20px;">Caricamento in corso...</td></tr>
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <script type="module" src="anagrafiche.js?v=61"></script>
    <script type="module" src="global_notifications.js"></script>
</body>
</html>
